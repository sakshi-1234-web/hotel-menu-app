<!DOCTYPE html>
<html>
<head>
    <title>Smart Hotel</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* HERO SECTION WITH IMAGE */
        .hero {
            height: 100vh;
            background: url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5") no-repeat center center/cover;
            position: relative;
        }

        /* DARK OVERLAY */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        /* MAIN CONTENT */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            top: 50%;
            transform: translateY(-50%);
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            color: #f1f1f1;
            margin-bottom: 30px;
        }

        /* BUTTONS */
        .btn {
            padding: 14px 28px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-btn {
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
        }

        .select-btn {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
        }

        .chef-btn {
            background: #9b59b6;
            color: white;
        }

        .combo-btn {
            background: #f39c12;
            color: white;
        }

        .offer-btn {
            background: #e74c3c;
            color: white;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* GLASS CARD */
        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        /* HOTEL IMAGE SECTION */
        .hotel-image {
            margin-top: 30px;
        }

        .hotel-image img {
            width: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="content">

        <div class="card">

            <h1>🍽️ Smart Hotel</h1>
            <p>Discover delicious dishes tailored to your taste & budget</p>

            <!-- MAIN BUTTONS -->
            <a href="/menu"><button class="btn menu-btn">📋 Show Menu</button></a>
            <a href="/select"><button class="btn select-btn">✨ Select Your Choice</button></a>

            <br>

            <!-- EXTRA BUTTONS -->
            <a href="/chef"><button class="btn chef-btn">👨‍🍳 Chef's Special</button></a>
            <a href="/combos"><button class="btn combo-btn">🍱 Combos</button></a>
            <a href="/offers"><button class="btn offer-btn">🎁 Special Offers</button></a>

            <!-- HOTEL IMAGE -->
            <div class="hotel-image">
                <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0" alt="Hotel">
            </div>

        </div>

    </div>
</div>

</body>
</html>
