<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #a1ffce, #faffd1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #27ae60;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #d4efdf;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin: 20px;
        }
    </style>
</head>

<body>

<h2>🍽️ Recommended Dishes ({{ count }})</h2>

<table>
<tr>
    <th>Dish</th>
    <th>Price</th>
    <th>Taste</th>
    <th>Cuisine</th>
</tr>

{% for item in data %}
<tr>
    <td>{{ item.name }}</td>
    <td>₹{{ item.price }}</td>
    <td>{{ item.taste }}</td>
    <td>{{ item.cuisine }}</td>
</tr>
{% endfor %}
</table>

<a href="/" class="back-btn">⬅ Back</a>

</body>
</html>
