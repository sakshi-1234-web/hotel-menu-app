<!DOCTYPE html>
<html>
<head>
    <title>Category</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #43cea2, #185a9d);
        }

        h2 {
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        .card {
            width: 300px;
            margin: 15px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin: 20px;
            color: white;
        }
    </style>
</head>

<body>

<h2>{{ title }}</h2>

{% for item in data %}
<div class="card">
    <h3>{{ item.name }}</h3>
    <p class="price">₹{{ item.price }}</p>
</div>
{% endfor %}

<a href="/" class="back-btn">⬅ Back</a>

</body>
</html>
