<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #f6d365, #fda085);
        }

        h2 {
            text-align: center;
            color: white;
            padding: 20px;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: linear-gradient(to right, #ff512f, #dd2476);
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #ffe0b2;
            transition: 0.3s;
        }

        .back-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #333;
            color: white;
            text-align: center;
            width: 150px;
            border-radius: 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>🍴 Our Delicious Menu</h2>

<table>
<tr>
    <th>Dish</th>
    <th>Price</th>
    <th>Taste</th>
    <th>Cuisine</th>
</tr>

{% for item in menu %}
<tr>
    <td>{{ item.name }}</td>
    <td>₹{{ item.price }}</td>
    <td>{{ item.taste }}</td>
    <td>{{ item.cuisine }}</td>
</tr>
{% endfor %}
</table>

<a href="/" class="back-btn">⬅ Back</a>

</body>
</html>
